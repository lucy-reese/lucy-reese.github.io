<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      :root {
            /* Color Palette - 5 Core Colors */
            --color-primary: #003E1F;     /* Deep Forest - Main Brand Color */
            --color-secondary: #594B5D;   /* Dusty Mauve - Complementary Action Color */
            --color-accent: #5C4423;      /* Brown Bark - Highlight / Warning Color */
            --color-neutral: #31081F;     /* Midnight Violet - Neutral Text and Background */
            --color-highlight: #C8040E;   /* Brick Ember - Accent / Attention Color */
            
            /* Derived Colors for Flexibility */
            --color-background: color-mix(in srgb, var(--color-neutral) 10%, white);
            --color-text-dark: var(--color-neutral);
            --color-text-light: white;

            /* Typography */
            --font-primary: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-secondary: 'Roboto Mono', monospace;

            /* Spacing System */
            /*Started at 0.5rem and increased 0.25rem for each*/
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.25rem;
            --spacing-xl: 1.5rem;

            /* Border Radius */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "TASA Explorer", sans-serif;
            line-height: 1.6;
            background-color: #ECE0D5; /*This changes background-->*/
            color: var(--color-text-dark);
            padding: var(--spacing-xl);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Typography Styles */
        /*All font sizes are 1.25x bigger than the previous, starting with small text being 1rem*/
        h1 {
            font-size: 2.44140625rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--color-primary);
        }

        h2 {
            font-size: 1.953125rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-secondary);
        }

        h3 {
            font-size: 1.5625rem;
            font-weight: 500;
            margin-bottom: var(--spacing-sm);
            color: var(--color-accent);
        }

        .body-text {
            font-size: 1.25rem;
            margin-bottom: var(--spacing-sm);
        }

        .small-text {
            font-size: 1rem;
            color: color-mix(in srgb, var(--color-text-dark) 70%, transparent);
        }

        /* Color Palette Section */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .color-swatch {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Component Styles */
        .button {
            display: inline-block;
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--color-primary);
            color: var(--color-text-light);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: background-color 0.3s ease, transform 0.2s;
            border: 2px solid transparent;
        }

        .button:hover {
            background-color: color-mix(in srgb, var(--color-primary) 80%, black);
            border-color: var(--color-accent);
            transform: scale(1.08);
        }

        .button:active {
            transform: scale(0.95);
            background-color: var(--color-secondary);
        }

        .link {
            color: var(--color-secondary);
            text-decoration: none;
            transition: color 0.3s ease, text-decoration-color 0.3s;
        }

        .link:hover {
            color: var(--color-highlight);
            text-decoration: underline;
            text-decoration-color: var(--color-highlight);
        }

        .link:visited {
            color: var(--color-neutral);
        }

        /* Spacing Demonstration */
        .spacing-demo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .spacing-block {
            background-color: var(--color-primary);
            height: 55px;
        }
    </style>
    <!--<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Roboto+Mono:wght@400;500&amp;display=swap" rel="stylesheet">-->
<!-- Amarante font start -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=TASA+Explorer:wght@400..800&display=swap" rel="stylesheet">
<!-- Amarante font end -->
    </style>
</head>
<body>
<div>
  <label for="custom-name">Enter custom name:</label>
  <input id="custom-name" type="text" placeholder="" />
</div>
<fieldset>
  <legend>Choose locale:</legend>
  <label for="us">US</label
  ><input id="us" type="radio" name="uk-us" value="us" checked />
  <label for="uk">UK</label
  ><input id="uk" type="radio" name="uk-us" value="uk" />
</fieldset>
<div>
  <button class="generate">Generate random story</button>
</div>
<!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
<p class="story"></p>

<script>
    // Complete variable definitions and random functions

const customName = document.getElementById("custom-name");
const generateBtn = document.querySelector(".generate");
const story = document.querySelector(".story");

function randomValueFromArray(array) {
  const random = Math.floor(Math.random() * array.length);
  return array[random];
}

// Raw text strings

const characters = ["Willy the Goblin", "Big Daddy", "Father Christmas", "Anthony Pinter", "Ralphie Buffalo"];

const places = ["the soup kitchen", "Disneyland", "the White House", "the ATLAS building", "Dark Horse"]

const events = ["froze into an ice cube", "died of frostbite", "had transformed into a snowman"];

// Partial return random string function

function returnRandomStoryString() {
    const randomCharacter = randomValueFromArray(characters);
    const randomPlace = randomValueFromArray(places);
    const randomEvent = randomValueFromArray(events);
    let storyText = `One snowy day, ${randomCharacter} went for a walk. By the time they got to ${randomPlace}, they ${randomEvent}. Bob saw the whole thing, but was not surprised — ${randomCharacter} was not wearing a winter coat and it was 2 degrees outside.`

  return storyText;
}

// Event listener and partial generate function definition

generateBtn.addEventListener("click", generateStory);

function generateStory() {
    let newStory = returnRandomStoryString();
  if (customName.value !== "") {
    const name = customName.value;
    newStory = newStory.replace("Bob", name);
  }

  if (document.getElementById("uk").checked) {
    const weight = `${Math.round(300 / 14)} stone`;      const temperature = `${Math.round((94-32) * (5/9))} Celsius`;
    newStory = newStory.replace("300 pounds", weight);
    newStory = newStory.replace("94 Fahrenheit", temperature);
  }

  // TODO: replace "" with the correct expression
  story.textContent = newStory;
  story.style.visibility = "visible";
}
</script>
</body>
</html>
