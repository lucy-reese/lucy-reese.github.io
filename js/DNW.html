            const b = Math.floor(Math.random() * 256);
            color = `rgb(${r}, ${g}, ${b})`;
        }

            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = color;
            ctx.fillRect(x,y,size,size);

            y += dy;
