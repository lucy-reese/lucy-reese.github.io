<!DOCTYPE html>
<html>
<head>
    <title>Final Project Draft</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
        .box {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 20px;
        }
        .box-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .submitButton {
            border: 0;
            line-height: 2.5;
            padding: 0 20px;
            font-size: 1rem;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 1px black;
            border-radius: 10px;
            background-color: tomato;
            background-image: linear-gradient(
                to top left,
                rgb(0 0 0 / 0.2),
                rgb(0 0 0 / 0.2) 30%,
                transparent
            );
            box-shadow:
                inset 2px 2px 3px rgb(255 255 255 / 0.6),
                inset -2px -2px 3px rgb(0 0 0 / 0.6);
        }
    </style>
</head>
<body>
    <canvas id="Canvas"></canvas>
    <div id="box" class="box"> <span class = "box-text">Volume</span></div>
    <!-- button  class="submitButton" type="button">Submit Volume!</button> //Submit Volume Button*/-->
    <script>
        const canvas = document.getElementById('Canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

       
        const boxHeight = 100;
        const boxWidth = 150;
        let x = Math.random() * (canvas.width - boxWidth);
        let y = Math.random() * (canvas.height - boxHeight);
        let dx = 0; //speed
        let dy = 0; //speed
        let color = 'rgb(0, 255, 255)';
        const label = "Volume";
        let count = 0;
        let newlabel = "-  "+count+"%  +";
        //var sButton = document.getElementById("submitButton"); //makes variable from HTML button

        function changeColor() {
            // Generate random RGB values
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            color = `rgb(${r}, ${g}, ${b})`;
        }

        //controls the increment and decrement of the volume
        //https://developer.mozilla.org/en-US/docs/Web/API/Element/getBoundingClientRect Quick Refrence for mdn page about getBoundingClientRect
        canvas.addEventListener('mousedown', function(e){
            //setting up mouse position with regards to the canvas/click event listener
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            //check if the click is in the volume box
            if (mouseX >= x && mouseX <= x + boxWidth && mouseY >= y && mouseY <= y + boxHeight){
                //Checking if it is plus or minus
                if (mouseX < x +(boxWidth/2)){
                    count--; //- button
                }
                else {
                    count ++; //+ button
                }
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = color;
            ctx.fillRect(x, y, boxWidth, boxHeight);

            //text
            ctx.fillStyle = "black";
            ctx.font = "bold 25px Helvetica";
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.fillText(label, x+(boxWidth/2), y+10);
            ctx.fillText(newlabel, x+(boxWidth/2), y+50);
            x += dx;
            y += dy;

        
            // Bounce off left/right window boundaries
            if (x + boxWidth >= canvas.width || x <= 0) {
                dx *= -1;
                changeColor();
            }

            // Bounce off top/bottom window boundaries
            if (y + boxHeight >= canvas.height || y <= 0) {
                dy *= -1;
                changeColor();
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
    </script>
</body>
</html>
