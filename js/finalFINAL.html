        .submitButton {

<body>
    <canvas id="Canvas"></canvas>

        <button id="resetButton" class="submitButton" type="button" style="margin-left: 10px; display: none;">Try Again</button>
</div>
    </div>  //Submit Volume Button
    <script>
        const canvas = document.getElementById('Canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let isAnimationRunning = true;
        const sButton = document.getElementById("submitButton");

        class Shape {
            constructor(type) {
                this.type = type; //rectangle or circle
                this.size = 100;
                this.x = Math.random() *(canvas.width - this.size);
                this.y = Math.random() * (canvas.height - this.size);

                //random direction
                let speedMultiplier = (Math.random()*2)+1;
                this.dx = (Math.random() < 0.5 ?1 :-1)* speedMultiplier;
                this.dy = (Math.random() < 0.5 ?1 :-1)* speedMultiplier;

                this.color = 'rgb(0,255,255)';
            }
            draw(){
                ctx.fillStyle = this.color;
                if(this.type === 'rect'){
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                }
                else if (this.type === 'circle'){
                    ctx.beginPath();
                    ctx.arc(this.x + this.size/2, this.y +this.size/2, this.size/2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = "black";
                ctx.font = "bold 20px Helvetica";
                ctx.textAlign = "center";
                ctx.fillText("- " + count + "% +", this.x + (this.size/2), this.y + (this.size/2) + 7);
            }
            update() {
                if (!isAnimationRunning){
                    return;
                }
                this.x += this.dx;
                this.y += this.dy;

                // Bounce logic
                if (this.x + this.size >= canvas.width || this.x <= 0) {
                    this.dx *= -1;
                    this.changeColor();
                }
                if (this.y + this.size >= canvas.height || this.y <= 0) {
                    this.dy *= -1;
                    this.changeColor();
                }
            }

            changeColor() {
                const r = Math.floor(Math.random() * 256);
                const g = Math.floor(Math.random() * 256);
                const b = Math.floor(Math.random() * 256);
                this.color = `rgb(${r}, ${g}, ${b})`;
            }

            isClicked(mouseX, mouseY) {
                // Rectangle collision detection
                return (mouseX >= this.x && mouseX <= this.x + this.size && mouseY >= this.y && mouseY <= this.y + this.size);
            }
        }

        const shapes = [
            new Shape('rect'),
            new Shape ('circle'),
            new Shape ('rect')
        ];

        //controls the increment and decrement of the volume
        //https://developer.mozilla.org/en-US/docs/Web/API/Element/getBoundingClientRect Quick Refrence for mdn page about getBoundingClientRect
        sButton.addEventListener('click', function() {
            if (isAnimationRunning) {
                 isAnimationRunning = false;
            alert("Your volume is " + count + "%");
        
            sButton.style.opacity = "0.5";
            sButton.style.cursor = "not-allowed";
            sButton.innerText = "Submitted!";
            
            // show the reset button 
            rButton.style.display = "inline-block";
    }
});
        canvas.addEventListener('mousedown', function(e){
            //setting up mouse position with regards to the canvas/click event listener
            
            if (!isAnimationRunning){
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            //check if the click is in the volume box
            shapes.forEach(shape => {
                if(shape.isClicked(mouseX, mouseY)){
                    if (mouseX < shape.x + (shape.size/2)){
                        count = Math.max(0, count-1); //make sure it doesn't go below 0;
                    }
                    else {
                        count++;
                    }
                    //updating speed based on count
                    let currentSpeed = Math.abs(count)*0.15 +0.5;
                    shapes.forEach(s=> {
                        s.dx = Math.sign(s.dx)*currentSpeed;
                        s.dy = Math.sign(s.dy) *currentSpeed;
                    });
                }
            });
            /* Old code for 1 box
            if (mouseX >= x && mouseX <= x + boxWidth && mouseY >= y && mouseY <= y + boxHeight){
                //Checking if it is plus or minus
                if (mouseX < x +(boxWidth/2)){
                    count--; //- button
                }
                else {
                    count ++; //+ button
                }
                //change speed based on volume
                //use abs to make sure the speed is always positive
                //Math.sign helps to remember which direction it is going
                let currentSpeed = Math.abs(count)*0.25;
                if (dx !== 0){
                    dx = Math.sign(dx) * currentSpeed;
                }
                if (dy !== 0) {
                    dy = Math.sign(dy) * currentSpeed
                }
                if (dx === 0 && count !== 0){
                    dx = currentSpeed;
                    dy = currentSpeed;
                }
            }
                */
        });

        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });
            if (isAnimationRunning){
                requestAnimationFrame(draw);
            }
            /* old draw code
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = color;
            ctx.fillRect(x, y, boxWidth, boxHeight);

            //draw text on box
            let newlabel = "-  "+count+"%  +";
            //text
            ctx.fillStyle = "black";
            ctx.font = "bold 25px Helvetica";
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.fillText(label, x+(boxWidth/2), y+10);
            ctx.fillText(newlabel, x+(boxWidth/2), y+50);

            if (!isAnimationRunning){
             return; // This stops the loop entirely
             }
    
            
            x += dx;
            y += dy;

        
            // Bounce off left/right window boundaries
            if (x + boxWidth >= canvas.width || x <= 0) {
                dx *= -1;
                changeColor();
            }

            // Bounce off top/bottom window boundaries
            if (y + boxHeight >= canvas.height || y <= 0) {
                dy *= -1;
                changeColor();
            }

            requestAnimationFrame(draw);
        }
*/
        }
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          
        });
        draw();
        const rButton = document.getElementById("resetButton");

        rButton.addEventListener('click', function() {
            // reset variables
            count = 0;
            isAnimationRunning = true;

            // reset shapes (randomize positions and speeds again)
            shapes.forEach(s => {
                s.x = Math.random() * (canvas.width - s.size);
                s.y = Math.random() * (canvas.height - s.size);
                s.dx = (Math.random() < 0.5 ? 1 : -1) * 2;
                s.dy = (Math.random() < 0.5 ? 1 : -1) * 2;
                s.color = 'rgb(0,255,255)';
            });

            // reset UI Buttons
            sButton.style.opacity = "1";
            sButton.style.cursor = "pointer";
            sButton.innerText = "Submit Volume!";
            rButton.style.display = "none"; // Hide reset button again

            // restart the draw loop
            draw();
        });
    </script>
</body>
